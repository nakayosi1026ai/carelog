<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#2D6A4F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ケアログ">
<meta name="description" content="糖尿病予備軍のための健康管理・食事記録アプリ">
<title>ケアログ - 糖尿病予防サポート</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #F7F5F0;
  --card: #FFFFFF;
  --card-alt: #FAFAF7;
  --primary: #2D6A4F;
  --primary-light: #40916C;
  --primary-pale: #E8F5EE;
  --accent: #D4A373;
  --accent-light: #FAEDCD;
  --danger: #E63946;
  --danger-light: #FFE0E3;
  --warning: #F4A261;
  --warning-light: #FFF3E0;
  --text: #1B1B1B;
  --text-sec: #6B6B6B;
  --text-muted: #9B9B9B;
  --border: #E8E5DE;
  --border-light: #F0EDE6;
  --nav-h: 68px;
  --header-h: 64px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Zen Maru Gothic', 'Hiragino Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

#app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100dvh;
  position: relative;
  padding-bottom: calc(var(--nav-h) + 16px);
}

.header {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  padding: 14px 20px;
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-logo { font-size: 26px; }
.header-title { font-size: 19px; font-weight: 900; color: #fff; letter-spacing: -0.5px; }
.header-sub { font-size: 10px; color: rgba(255,255,255,.7); font-weight: 400; margin-top: 1px; }
.header-date {
  background: rgba(255,255,255,.18);
  color: #fff;
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 20px;
  font-weight: 500;
}

.install-banner {
  background: linear-gradient(135deg, var(--accent-light), #FFF8F0);
  border: 1px solid rgba(212,163,115,.3);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: transform .15s;
  animation: fadeSlideIn .5s ease;
}
.install-banner:active { transform: scale(.97); }
.install-banner-icon { font-size: 28px; }
.install-banner-text { flex: 1; font-size: 13px; line-height: 1.5; color: var(--text); }
.install-banner-text strong { color: var(--primary); }
.install-banner-btn {
  background: var(--primary);
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
}

.nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: rgba(255,255,255,.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex;
  justify-content: space-around;
  padding: 6px 0 max(10px, env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
  z-index: 50;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 12px;
  font-family: inherit;
  color: var(--text-muted);
  transition: color .2s, transform .15s;
  font-size: 10px;
  gap: 2px;
}
.nav-item.active { color: var(--primary); font-weight: 700; }
.nav-item:active { transform: scale(.9); }
.nav-icon { font-size: 22px; }

.main { padding: 16px 16px 24px; }

.card {
  background: var(--card);
  border-radius: 14px;
  padding: 16px;
  border: 1px solid var(--border);
  animation: fadeSlideIn .4s ease;
}
.card-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }

.tip-banner {
  background: linear-gradient(135deg, var(--accent-light), #FFF8F0);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  border: 1px solid rgba(212,163,115,.25);
  animation: fadeSlideIn .5s ease;
}
.tip-banner-icon { font-size: 28px; flex-shrink: 0; }
.tip-banner-text { font-size: 13px; line-height: 1.7; }

.cal-section { display: flex; align-items: center; gap: 20px; padding: 8px 0; }
.cal-ring { position: relative; width: 110px; height: 110px; flex-shrink: 0; }
.cal-ring-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.cal-ring-val { font-size: 20px; font-weight: 900; }
.cal-ring-label { font-size: 10px; color: var(--text-muted); }
.macro-section { flex: 1; }

.macro-row { margin-bottom: 10px; }
.macro-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
.macro-label { color: var(--text-sec); }
.macro-value { font-weight: 700; }
.macro-bar { height: 6px; border-radius: 3px; background: var(--border-light); overflow: hidden; }
.macro-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }

.actions { display: flex; gap: 12px; }
.action-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 16px 12px;
  border-radius: 14px;
  border: 1px solid rgba(45,106,79,.25);
  background: var(--primary-pale);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  font-family: inherit;
  transition: transform .15s;
}
.action-btn:active { transform: scale(.96); }
.action-btn.alt {
  background: var(--accent-light);
  border-color: rgba(212,163,115,.3);
  color: #8B6914;
}
.action-btn-icon { font-size: 24px; }

.stat-chips { display: flex; gap: 10px; flex-wrap: wrap; }
.stat-chip {
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 14px; background: var(--card-alt); border-radius: 10px;
  border: 1px solid var(--border-light); flex: 1; min-width: 80px;
}
.stat-chip-label { font-size: 10px; color: var(--text-muted); margin-bottom: 3px; }
.stat-chip-val { font-size: 22px; font-weight: 900; color: var(--primary); }
.stat-chip-unit { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

.meal-sum-row {
  display: flex; justify-content: space-between; padding: 7px 0;
  font-size: 14px; border-bottom: 1px solid var(--border-light);
}
.meal-sum-row:last-child { border-bottom: none; }

.section-title { font-size: 20px; font-weight: 900; letter-spacing: -0.3px; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }

.add-btn {
  padding: 8px 16px;
  border-radius: 10px;
  border: none;
  background: var(--primary);
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: transform .15s;
}
.add-btn:active { transform: scale(.95); }

.date-label { font-size: 14px; font-weight: 700; margin: 0 0 8px 2px; }
.date-label-sub { font-weight: 400; margin-left: 8px; color: var(--text-muted); }

.meal-card {
  background: var(--card);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
  animation: fadeSlideIn .3s ease;
}
.meal-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
.meal-card-type { font-size: 14px; font-weight: 600; }
.meal-card-items { margin-top: 6px; }
.meal-card-item { font-size: 13px; color: var(--text-sec); line-height: 1.6; }
.meal-card-item-gi { margin-left: 6px; font-size: 10px; color: var(--text-muted); }
.meal-card-cal { font-weight: 700; color: var(--primary); font-size: 14px; }
.delete-btn {
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  font-size: 14px; padding: 2px 6px; border-radius: 4px;
}
.delete-btn:hover { color: var(--danger); }

.empty-state { text-align: center; padding: 48px 20px; }
.empty-icon { font-size: 48px; }
.empty-text { color: var(--text-muted); margin-top: 12px; font-size: 14px; }

.health-row {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px;
}
.health-vals { display: flex; gap: 16px; flex-wrap: wrap; }
.health-val { font-size: 13px; }
.health-val strong { font-weight: 700; }
.health-val.danger strong { color: var(--danger); }
.health-val.safe strong { color: var(--primary); }
.health-note { font-size: 12px; color: var(--text-muted); margin-top: 6px; width: 100%; }

.chart-wrap { padding: 8px 0; }
.chart-labels { display: flex; justify-content: space-between; padding: 0 2px; }
.chart-label { font-size: 10px; color: var(--text-muted); }

.tip-intro { font-size: 13px; color: var(--text-sec); line-height: 1.7; margin-bottom: 4px; }
.tip-card {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 16px; background: var(--card); border-radius: 14px;
  border: 1px solid var(--border); animation: fadeSlideIn .4s ease;
}
.tip-card-icon { font-size: 32px; flex-shrink: 0; }
.tip-card-text { font-size: 14px; line-height: 1.7; }
.notice-card {
  background: var(--primary-pale);
  border: 1px solid rgba(64,145,108,.3);
  border-radius: 14px;
  padding: 16px;
}
.notice-title { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
.notice-text { font-size: 12px; line-height: 1.7; color: var(--text-sec); }

.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 100;
  animation: fadeIn .2s ease;
}
.modal {
  background: var(--card);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px 32px;
  width: 100%;
  max-width: 430px;
  max-height: 85dvh;
  overflow-y: auto;
  animation: slideUp .3s ease;
}
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-title { font-size: 18px; font-weight: 700; }
.close-btn {
  background: var(--card-alt); border: none;
  width: 34px; height: 34px; border-radius: 50%;
  cursor: pointer; font-size: 16px; color: var(--text-sec);
  display: flex; align-items: center; justify-content: center;
}
.close-btn:hover { background: var(--border); }

.meal-types { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.chip-btn {
  padding: 7px 13px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--card-alt);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  transition: all .15s;
  color: var(--text);
}
.chip-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.selected-items {
  margin-bottom: 12px; padding: 12px;
  background: var(--primary-pale); border-radius: 10px;
}
.selected-item { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: 13px; }
.selected-total {
  border-top: 1px solid rgba(45,106,79,.25);
  margin-top: 8px; padding-top: 8px;
  font-size: 14px; font-weight: 700; text-align: right; color: var(--primary);
}

.search-row { display: flex; gap: 8px; margin-bottom: 12px; }
.input {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  background: var(--card-alt);
  transition: border-color .2s;
}
.input:focus { border-color: var(--primary); }
.label { font-size: 12px; font-weight: 600; color: var(--text-sec); margin-bottom: 4px; display: block; }

.food-list { max-height: 200px; overflow-y: auto; margin-bottom: 12px; }
.food-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 12px; width: 100%; border: none;
  border-bottom: 1px solid var(--border-light);
  background: transparent; cursor: pointer; font-family: inherit;
  text-align: left; font-size: 13px;
}
.food-item:active { background: var(--primary-pale); }
.food-name { font-weight: 500; }
.food-gi {
  margin-left: 6px; font-size: 10px; padding: 1px 6px; border-radius: 4px;
  display: inline-block;
}
.food-gi.low { background: var(--primary-pale); color: var(--primary); }
.food-gi.high { background: var(--danger-light); color: var(--danger); }
.food-gi.mid { background: var(--warning-light); color: var(--warning); }
.food-cal { font-size: 12px; color: var(--text-muted); }

.custom-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.custom-row { display: flex; gap: 8px; }
.custom-row .input { flex: 1; }

.save-btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  margin-top: 8px;
  transition: transform .15s, opacity .15s;
}
.save-btn:active { transform: scale(.97); }
.save-btn:disabled { opacity: .5; cursor: default; }

.input-warning { font-size: 11px; color: var(--danger); margin-top: 4px; }

.gap-16 { display: flex; flex-direction: column; gap: 16px; }
.gap-14 { display: flex; flex-direction: column; gap: 14px; }
.flex-center { display: flex; align-items: center; gap: 10px; }

.offline-bar {
  background: var(--warning);
  color: #fff;
  text-align: center;
  padding: 6px;
  font-size: 12px;
  font-weight: 600;
  display: none;
}
.offline-bar.show { display: block; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
</style>
</head>
<body>

<div id="offline-bar" class="offline-bar">オフラインモード - データはローカルに保存されます</div>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════
//  Service Worker Registration
// ═══════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW registration failed:', err));
  });
}

// Offline detection
window.addEventListener('online', () => document.getElementById('offline-bar').classList.remove('show'));
window.addEventListener('offline', () => document.getElementById('offline-bar').classList.add('show'));

// ═══════════════════════════════════════════
//  PWA Install Prompt
// ═══════════════════════════════════════════
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  render();
});

// ═══════════════════════════════════════════
//  Data Layer (localStorage)
// ═══════════════════════════════════════════
const DB = {
  get(key, fallback = []) {
    try { return JSON.parse(localStorage.getItem(key)) || fallback; }
    catch { return fallback; }
  },
  set(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
};

// ═══════════════════════════════════════════
//  State
// ═══════════════════════════════════════════
let state = {
  tab: 'home',
  meals: DB.get('cl_meals'),
  healthData: DB.get('cl_health'),
  tipIndex: 0,
  modal: null,
  mealType: 'breakfast',
  mealItems: [],
  mealSearch: '',
  customMode: false,
  customName: '', customCal: '', customCarb: '', customProtein: '', customFat: '',
  hBloodSugar: '', hWeight: '', hHba1c: '', hNote: '',
};

function setState(patch) {
  Object.assign(state, patch);
  if ('meals' in patch) DB.set('cl_meals', state.meals);
  if ('healthData' in patch) DB.set('cl_health', state.healthData);
  render();
}

// ═══════════════════════════════════════════
//  Food Database
// ═══════════════════════════════════════════
const FOODS = [
  { name: "白ご飯 (1杯)", cal: 235, carb: 53, protein: 4, fat: 0.5, gi: "高" },
  { name: "玄米ご飯 (1杯)", cal: 228, carb: 48, protein: 5, fat: 1.8, gi: "低" },
  { name: "食パン (1枚)", cal: 158, carb: 28, protein: 5, fat: 2.5, gi: "高" },
  { name: "全粒粉パン (1枚)", cal: 140, carb: 24, protein: 6, fat: 2, gi: "低" },
  { name: "鶏むね肉 (100g)", cal: 108, carb: 0, protein: 23, fat: 1.5, gi: "-" },
  { name: "鮭 (1切れ)", cal: 133, carb: 0, protein: 22, fat: 4.5, gi: "-" },
  { name: "豆腐 (1丁)", cal: 72, carb: 2, protein: 7, fat: 4, gi: "低" },
  { name: "納豆 (1パック)", cal: 100, carb: 6, protein: 8, fat: 5, gi: "低" },
  { name: "味噌汁 (1杯)", cal: 40, carb: 5, protein: 3, fat: 1, gi: "低" },
  { name: "サラダ (1皿)", cal: 25, carb: 5, protein: 1, fat: 0.3, gi: "低" },
  { name: "卵 (1個)", cal: 91, carb: 0.3, protein: 7, fat: 7, gi: "-" },
  { name: "バナナ (1本)", cal: 86, carb: 22, protein: 1, fat: 0.2, gi: "中" },
  { name: "りんご (1個)", cal: 57, carb: 15, protein: 0.2, fat: 0.1, gi: "低" },
  { name: "ヨーグルト (100g)", cal: 62, carb: 5, protein: 4, fat: 3, gi: "低" },
  { name: "牛乳 (200ml)", cal: 134, carb: 10, protein: 7, fat: 8, gi: "低" },
  { name: "うどん (1玉)", cal: 270, carb: 56, protein: 7, fat: 1, gi: "高" },
  { name: "そば (1玉)", cal: 260, carb: 50, protein: 10, fat: 2, gi: "低" },
  { name: "さつまいも (中1本)", cal: 140, carb: 33, protein: 1.2, fat: 0.2, gi: "中" },
  { name: "ブロッコリー (100g)", cal: 33, carb: 5, protein: 4, fat: 0.4, gi: "低" },
  { name: "鶏もも肉 (100g)", cal: 200, carb: 0, protein: 16, fat: 14, gi: "-" },
  { name: "目玉焼き (1個)", cal: 110, carb: 0.35, protein: 6.36, fat: 9.31, gi: "-" },
  { name: "十穀米 (1杯)", cal: 250, carb: 53.75, protein: 4.25, fat: 1.25, gi: "低" },
  { name: "もずく (1パック)", cal: 4, carb: 1.4, protein: 0.2, fat: 0, gi: "低" },
  { name: "めかぶ (1パック)", cal: 11, carb: 3.4, protein: 0.9, fat: 0, gi: "低" },
];

const MEAL_TYPES = [
  { key: 'breakfast', label: '朝食', icon: '🌅' },
  { key: 'lunch', label: '昼食', icon: '☀️' },
  { key: 'dinner', label: '夕食', icon: '🌙' },
  { key: 'snack', label: '間食', icon: '🍎' },
];

const TIPS = [
  { icon: "🥗", text: "食事の最初に野菜を食べると、血糖値の急上昇を抑えられます（ベジファースト）" },
  { icon: "🚶", text: "食後15〜30分のウォーキングが血糖値コントロールに効果的です" },
  { icon: "🌾", text: "白米を玄米や雑穀米に置き換えると、GI値を下げられます" },
  { icon: "💧", text: "水をこまめに飲むことで、血糖値の安定に役立ちます" },
  { icon: "😴", text: "睡眠不足はインスリン抵抗性を高めます。7〜8時間の睡眠を心がけましょう" },
  { icon: "🥜", text: "ナッツ類は低GIで良質な脂質を含み、間食におすすめです" },
  { icon: "🍵", text: "緑茶に含まれるカテキンは、血糖値の上昇を緩やかにする効果があります" },
  { icon: "⏰", text: "規則正しい食事時間が、血糖値の安定に繋がります" },
];

setInterval(() => {
  state.tipIndex = (state.tipIndex + 1) % TIPS.length;
  if (state.tab === 'home' && !state.modal) render();
}, 8000);

// ═══════════════════════════════════════════
//  Helpers
// ═══════════════════════════════════════════
const todayStr = () => new Date().toISOString().split('T')[0];
const fmtDate = d => { const dt = new Date(d); return `${dt.getMonth()+1}/${dt.getDate()}`; };
const todayLabel = () => new Date().toLocaleDateString('ja-JP', { month: 'long', day: 'numeric', weekday: 'short' });
const sum = (arr, fn) => arr.reduce((s, x) => s + fn(x), 0);
const esc = s => String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function calorieRingSVG(cal, target) {
  const pct = Math.min(cal / target * 100, 100);
  const r = 44, c = 2 * Math.PI * r;
  const offset = c - (pct / 100) * c;
  const color = pct > 100 ? 'var(--danger)' : pct > 80 ? 'var(--warning)' : 'var(--primary)';
  return `<div class="cal-ring">
    <svg width="110" height="110" viewBox="0 0 110 110">
      <circle cx="55" cy="55" r="${r}" fill="none" stroke="var(--border-light)" stroke-width="10"/>
      <circle cx="55" cy="55" r="${r}" fill="none" stroke="${color}" stroke-width="10"
        stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${offset}"
        transform="rotate(-90 55 55)" style="transition:stroke-dashoffset .8s ease"/>
    </svg>
    <div class="cal-ring-center">
      <span class="cal-ring-val">${cal}</span>
      <span class="cal-ring-label">/ ${target} kcal</span>
    </div>
  </div>`;
}

function macroBarHTML(label, value, max, color) {
  const pct = Math.min(value / max * 100, 100);
  return `<div class="macro-row">
    <div class="macro-header"><span class="macro-label">${label}</span><span class="macro-value">${value}g</span></div>
    <div class="macro-bar"><div class="macro-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}

function miniChartSVG(data, color, dangerZone) {
  if (data.length < 2) return '';
  const vals = data.map(d => d.value);
  const min = Math.min(...vals) * 0.95, max = Math.max(...vals) * 1.05;
  const range = max - min || 1;
  const w = 100 / (data.length - 1);
  const points = data.map((d, i) => `${i * w},${100 - ((d.value - min) / range) * 80 - 10}`).join(' ');
  const dots = data.map((d, i) => {
    const x = i * w, y = 100 - ((d.value - min) / range) * 80 - 10;
    return `<circle cx="${x}" cy="${y}" r="1.8" fill="${color}"/>`;
  }).join('');
  let dangerLine = '';
  if (dangerZone) {
    const dy = 100 - ((dangerZone - min) / range) * 80 - 10;
    if (dy > 0 && dy < 100) {
      dangerLine = `<line x1="0" y1="${dy}" x2="100" y2="${dy}" stroke="var(--danger)" stroke-width="0.3" stroke-dasharray="2,2"/>
        <text x="1" y="${dy - 1.5}" fill="var(--danger)" font-size="4" font-family="sans-serif">${dangerZone}</text>`;
    }
  }
  const labels = data.map(d => `<span class="chart-label">${d.label}</span>`).join('');
  return `<div class="chart-wrap">
    <svg viewBox="0 0 100 100" style="width:100%;height:120px" preserveAspectRatio="none">
      ${dangerLine}
      <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      ${dots}
    </svg>
    <div class="chart-labels">${labels}</div>
  </div>`;
}

// ═══════════════════════════════════════════
//  Tab Renderers
// ═══════════════════════════════════════════
function renderHome() {
  const today = todayStr();
  const todayMeals = state.meals.filter(m => m.date === today);
  const cal = sum(todayMeals, m => sum(m.items, i => i.cal));
  const carb = sum(todayMeals, m => sum(m.items, i => i.carb));
  const protein = sum(todayMeals, m => sum(m.items, i => i.protein));
  const fat = sum(todayMeals, m => sum(m.items, i => i.fat));
  const tip = TIPS[state.tipIndex];
  const latest = state.healthData.length ? state.healthData[state.healthData.length - 1] : null;

  let installBanner = '';
  if (deferredPrompt) {
    installBanner = `<div class="install-banner" onclick="installPWA()">
      <span class="install-banner-icon">📲</span>
      <div class="install-banner-text"><strong>ホーム画面に追加</strong>して、アプリとして使いましょう！オフラインでも利用できます。</div>
      <button class="install-banner-btn">追加</button>
    </div>`;
  }

  let mealsSummary = '';
  if (todayMeals.length) {
    const rows = todayMeals.map(m => {
      const mt = MEAL_TYPES.find(t => t.key === m.type);
      return `<div class="meal-sum-row"><span>${mt?.icon||''} ${mt?.label||''}</span><span style="color:var(--text-sec);font-size:13px">${sum(m.items,i=>i.cal)} kcal</span></div>`;
    }).join('');
    mealsSummary = `<div class="card"><h3 class="card-title">今日の食事</h3>${rows}</div>`;
  }

  let healthSummary = '';
  if (latest) {
    let chips = '';
    if (latest.bloodSugar) chips += `<div class="stat-chip"><span class="stat-chip-label">血糖値</span><span class="stat-chip-val">${latest.bloodSugar}</span><span class="stat-chip-unit">mg/dL</span></div>`;
    if (latest.weight) chips += `<div class="stat-chip"><span class="stat-chip-label">体重</span><span class="stat-chip-val">${latest.weight}</span><span class="stat-chip-unit">kg</span></div>`;
    if (latest.hba1c) chips += `<div class="stat-chip"><span class="stat-chip-label">HbA1c</span><span class="stat-chip-val">${latest.hba1c}</span><span class="stat-chip-unit">%</span></div>`;
    healthSummary = `<div class="card"><h3 class="card-title">最新の健康データ</h3><div class="stat-chips">${chips}</div></div>`;
  }

  return `<div class="gap-16">
    ${installBanner}
    <div class="tip-banner"><span class="tip-banner-icon">${tip.icon}</span><p class="tip-banner-text">${tip.text}</p></div>
    <div class="card">
      <h3 class="card-title">今日のカロリー</h3>
      <div class="cal-section">
        ${calorieRingSVG(cal, 1800)}
        <div class="macro-section">
          ${macroBarHTML('炭水化物', carb, 250, 'var(--warning)')}
          ${macroBarHTML('タンパク質', protein, 80, 'var(--primary)')}
          ${macroBarHTML('脂質', fat, 55, 'var(--accent)')}
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="action-btn" onclick="setState({modal:'meal'})"><span class="action-btn-icon">🍽️</span><span>食事を記録</span></button>
      <button class="action-btn alt" onclick="setState({modal:'health'})"><span class="action-btn-icon">📊</span><span>健康データ</span></button>
    </div>
    ${mealsSummary}
    ${healthSummary}
  </div>`;
}

function renderMeals() {
  const grouped = {};
  [...state.meals].reverse().forEach(m => { if (!grouped[m.date]) grouped[m.date] = []; grouped[m.date].push(m); });
  const keys = Object.keys(grouped);
  if (!keys.length) {
    return `<div class="gap-16">
      <div class="section-header"><h2 class="section-title">食事記録</h2><button class="add-btn" onclick="setState({modal:'meal'})">＋ 記録する</button></div>
      <div class="empty-state"><div class="empty-icon">🍽️</div><p class="empty-text">まだ食事記録がありません</p><button class="add-btn" style="margin-top:12px" onclick="setState({modal:'meal'})">最初の食事を記録する</button></div>
    </div>`;
  }
  const sections = keys.map(date => {
    const dayMeals = grouped[date];
    const dayCal = sum(dayMeals, m => sum(m.items, i => i.cal));
    const cards = dayMeals.map(meal => {
      const mt = MEAL_TYPES.find(t => t.key === meal.type);
      const items = meal.items.map(item => {
        const giTag = item.gi !== '-' ? `<span class="meal-card-item-gi">GI:${item.gi}</span>` : '';
        return `<div class="meal-card-item">${esc(item.name)} <span style="margin-left:4px;color:var(--text-muted);font-size:11px">${item.cal}kcal</span> ${giTag}</div>`;
      }).join('');
      return `<div class="meal-card"><div class="meal-card-header"><div><span class="meal-card-type">${mt?.icon||''} ${mt?.label||''}</span><div class="meal-card-items">${items}</div></div><div class="flex-center"><span class="meal-card-cal">${sum(meal.items,i=>i.cal)} kcal</span><button class="delete-btn" onclick="deleteMeal(${meal.id})">✕</button></div></div></div>`;
    }).join('');
    return `<div><p class="date-label">${date===todayStr()?'今日':fmtDate(date)}<span class="date-label-sub">合計 ${dayCal} kcal</span></p>${cards}</div>`;
  }).join('');
  return `<div class="gap-16"><div class="section-header"><h2 class="section-title">食事記録</h2><button class="add-btn" onclick="setState({modal:'meal'})">＋ 記録する</button></div>${sections}</div>`;
}

function renderHealth() {
  const reversed = [...state.healthData].reverse();
  const last7W = state.healthData.filter(d => d.weight).slice(-7);
  const last7BS = state.healthData.filter(d => d.bloodSugar).slice(-7);
  let charts = '';
  if (last7W.length >= 2) charts += `<div class="card"><h3 class="card-title">体重の推移</h3>${miniChartSVG(last7W.map(d=>({label:fmtDate(d.date),value:d.weight})),'var(--primary)')}</div>`;
  if (last7BS.length >= 2) charts += `<div class="card"><h3 class="card-title">血糖値の推移</h3>${miniChartSVG(last7BS.map(d=>({label:fmtDate(d.date),value:d.bloodSugar})),'var(--accent)',140)}</div>`;
  if (!reversed.length) {
    return `<div class="gap-16"><div class="section-header"><h2 class="section-title">健康データ</h2><button class="add-btn" onclick="setState({modal:'health'})">＋ 記録する</button></div><div class="empty-state"><div class="empty-icon">📊</div><p class="empty-text">まだ記録がありません</p><button class="add-btn" style="margin-top:12px" onclick="setState({modal:'health'})">最初のデータを記録する</button></div></div>`;
  }
  const records = reversed.map(rec => {
    let vals = '';
    if (rec.bloodSugar) { const cls = rec.bloodSugar > 140 ? 'danger' : 'safe'; vals += `<span class="health-val ${cls}">血糖値: <strong>${rec.bloodSugar}</strong> mg/dL</span>`; }
    if (rec.weight) vals += `<span class="health-val">体重: <strong>${rec.weight}</strong> kg</span>`;
    if (rec.hba1c) { const cls = rec.hba1c > 6.0 ? 'danger' : 'safe'; vals += `<span class="health-val ${cls}">HbA1c: <strong>${rec.hba1c}</strong>%</span>`; }
    const note = rec.note ? `<div class="health-note">${esc(rec.note)}</div>` : '';
    return `<div class="meal-card"><div class="health-row"><span style="font-size:13px;color:var(--text-muted)">${fmtDate(rec.date)}</span><div class="health-vals">${vals}</div>${note}</div></div>`;
  }).join('');
  return `<div class="gap-16"><div class="section-header"><h2 class="section-title">健康データ</h2><button class="add-btn" onclick="setState({modal:'health'})">＋ 記録する</button></div>${charts}${records}</div>`;
}

function renderTips() {
  const cards = TIPS.map(t => `<div class="tip-card"><span class="tip-card-icon">${t.icon}</span><p class="tip-card-text">${t.text}</p></div>`).join('');
  return `<div class="gap-16">
    <h2 class="section-title">予防のヒント</h2>
    <p class="tip-intro">糖尿病予備軍の段階で生活習慣を改善すれば、発症リスクを大幅に減らすことができます。以下のアドバイスを日常に取り入れてみましょう。</p>
    ${cards}
    <div class="notice-card"><div class="notice-title">⚠️ 注意事項</div><p class="notice-text">このアプリは一般的な健康管理の参考情報を提供するものであり、医療アドバイスではありません。具体的な治療や食事療法については、必ず医師や管理栄養士にご相談ください。</p></div>
  </div>`;
}

// ═══════════════════════════════════════════
//  Modal Renderers
// ═══════════════════════════════════════════
function renderMealModal() {
  const chips = MEAL_TYPES.map(mt => `<button class="chip-btn ${state.mealType===mt.key?'active':''}" onclick="setState({mealType:'${mt.key}'})">${mt.icon} ${mt.label}</button>`).join('');
  let selectedHTML = '';
  if (state.mealItems.length) {
    const items = state.mealItems.map((item, idx) => `<div class="selected-item"><span>${esc(item.name)}</span><div class="flex-center"><span style="color:var(--text-muted)">${item.cal} kcal</span><button class="delete-btn" style="font-size:11px" onclick="removeMealItem(${idx})">✕</button></div></div>`).join('');
    selectedHTML = `<div class="selected-items">${items}<div class="selected-total">合計: ${sum(state.mealItems,i=>i.cal)} kcal</div></div>`;
  }
  let listHTML = '';
  if (state.customMode) {
    listHTML = `<div class="custom-form">
      <input class="input" placeholder="食品名" value="${esc(state.customName)}" oninput="state.customName=this.value">
      <div class="custom-row"><input class="input" type="number" placeholder="カロリー" value="${state.customCal}" oninput="state.customCal=this.value"><input class="input" type="number" placeholder="炭水化物(g)" value="${state.customCarb}" oninput="state.customCarb=this.value"></div>
      <div class="custom-row"><input class="input" type="number" placeholder="タンパク質(g)" value="${state.customProtein}" oninput="state.customProtein=this.value"><input class="input" type="number" placeholder="脂質(g)" value="${state.customFat}" oninput="state.customFat=this.value"></div>
      <button class="add-btn" onclick="addCustomFood()">追加する</button>
    </div>`;
  } else {
    const filtered = FOODS.filter(f => f.name.includes(state.mealSearch));
    const items = filtered.map((f, i) => {
      let giTag = '';
      if (f.gi !== '-') { const cls = f.gi==='低'?'low':f.gi==='高'?'high':'mid'; giTag = `<span class="food-gi ${cls}">GI:${f.gi}</span>`; }
      return `<button class="food-item" onclick="addFoodItem(${i})"><div><span class="food-name">${f.name}</span>${giTag}</div><span class="food-cal">${f.cal} kcal</span></button>`;
    }).join('');
    listHTML = `<div class="food-list">${items}</div>`;
  }
  return `<div class="overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header"><h2 class="modal-title">食事を記録</h2><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="meal-types">${chips}</div>
    ${selectedHTML}
    <div class="search-row"><input class="input" placeholder="食品を検索..." value="${esc(state.mealSearch)}" oninput="setState({mealSearch:this.value,customMode:false})"><button class="chip-btn" style="font-size:12px;white-space:nowrap" onclick="setState({customMode:!state.customMode})">${state.customMode?'一覧':'手入力'}</button></div>
    ${listHTML}
    <button class="save-btn" ${state.mealItems.length===0?'disabled':''} onclick="saveMeal()">記録する</button>
  </div></div>`;
}

function renderHealthModal() {
  const bsWarn = state.hBloodSugar && Number(state.hBloodSugar) >= 140 ? '<p class="input-warning">⚠️ 140mg/dL以上は要注意です。医師にご相談ください。</p>' : '';
  const hbWarn = state.hHba1c && Number(state.hHba1c) >= 6.0 ? '<p class="input-warning">⚠️ 6.0%以上は糖尿病予備軍の基準値です。</p>' : '';
  const canSave = state.hBloodSugar || state.hWeight || state.hHba1c;
  return `<div class="overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header"><h2 class="modal-title">健康データを記録</h2><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="gap-14">
      <div><label class="label">血糖値 (mg/dL)</label><input class="input" type="number" placeholder="例: 110" value="${state.hBloodSugar}" oninput="setState({hBloodSugar:this.value})">${bsWarn}</div>
      <div><label class="label">体重 (kg)</label><input class="input" type="number" step="0.1" placeholder="例: 65.0" value="${state.hWeight}" oninput="setState({hWeight:this.value})"></div>
      <div><label class="label">HbA1c (%)</label><input class="input" type="number" step="0.1" placeholder="例: 5.8" value="${state.hHba1c}" oninput="setState({hHba1c:this.value})">${hbWarn}</div>
      <div><label class="label">メモ</label><input class="input" placeholder="体調や気になることなど" value="${esc(state.hNote)}" oninput="state.hNote=this.value"></div>
    </div>
    <button class="save-btn" style="margin-top:20px" ${canSave?'':'disabled'} onclick="saveHealth()">記録する</button>
  </div></div>`;
}

// ═══════════════════════════════════════════
//  Actions
// ═══════════════════════════════════════════
window.addFoodItem = function(idx) {
  const filtered = FOODS.filter(f => f.name.includes(state.mealSearch));
  state.mealItems = [...state.mealItems, { ...filtered[idx] }];
  render();
};
window.removeMealItem = function(idx) { state.mealItems = state.mealItems.filter((_,i)=>i!==idx); render(); };
window.addCustomFood = function() {
  if (!state.customName || !state.customCal) return;
  state.mealItems = [...state.mealItems, { name: state.customName, cal: Number(state.customCal), carb: Number(state.customCarb)||0, protein: Number(state.customProtein)||0, fat: Number(state.customFat)||0, gi: '-' }];
  state.customName=''; state.customCal=''; state.customCarb=''; state.customProtein=''; state.customFat=''; state.customMode=false;
  render();
};
window.saveMeal = function() {
  if (!state.mealItems.length) return;
  setState({ meals: [...state.meals, { id: Date.now(), date: todayStr(), type: state.mealType, items: [...state.mealItems] }], modal: null, mealItems: [], mealSearch: '', customMode: false });
};
window.saveHealth = function() {
  if (!state.hBloodSugar && !state.hWeight && !state.hHba1c) return;
  setState({ healthData: [...state.healthData, { id: Date.now(), date: todayStr(), bloodSugar: state.hBloodSugar?Number(state.hBloodSugar):null, weight: state.hWeight?Number(state.hWeight):null, hba1c: state.hHba1c?Number(state.hHba1c):null, note: state.hNote }], modal: null, hBloodSugar: '', hWeight: '', hHba1c: '', hNote: '' });
};
window.deleteMeal = function(id) { setState({ meals: state.meals.filter(m => m.id !== id) }); };
window.closeModal = function() { setState({ modal: null, mealItems: [], mealSearch: '', customMode: false, hBloodSugar: '', hWeight: '', hHba1c: '', hNote: '' }); };
window.installPWA = async function() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  render();
};

// ═══════════════════════════════════════════
//  Main Render
// ═══════════════════════════════════════════
function render() {
  let content = '';
  switch (state.tab) {
    case 'home': content = renderHome(); break;
    case 'meals': content = renderMeals(); break;
    case 'health': content = renderHealth(); break;
    case 'tips': content = renderTips(); break;
  }
  let modalHTML = '';
  if (state.modal === 'meal') modalHTML = renderMealModal();
  if (state.modal === 'health') modalHTML = renderHealthModal();
  const navItems = [
    { key:'home', icon:'🏠', label:'ホーム' },
    { key:'meals', icon:'🍽️', label:'食事記録' },
    { key:'health', icon:'📊', label:'健康データ' },
    { key:'tips', icon:'💡', label:'アドバイス' },
  ].map(t => `<button class="nav-item ${state.tab===t.key?'active':''}" onclick="setState({tab:'${t.key}'})"><span class="nav-icon">${t.icon}</span><span>${t.label}</span></button>`).join('');

  document.getElementById('app').innerHTML = `
    <header class="header">
      <div class="header-brand"><span class="header-logo">🌿</span><div><div class="header-title">ケアログ</div><div class="header-sub">糖尿病予防サポート</div></div></div>
      <div class="header-date">${todayLabel()}</div>
    </header>
    <main class="main">${content}</main>
    ${modalHTML}
    <nav class="nav">${navItems}</nav>`;
}

render();
</script>
</body>
</html>
